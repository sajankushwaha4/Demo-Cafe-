<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::main})}">
<body>
<main>
<div class="container">
    <div class="menu-layout">
        
        <!-- Menu Categories and Grid -->
        <div class="menu-sections">
            <div class="section-title" style="margin-bottom: 2rem; text-align: left;">
                <h2>Our Delicious Menu</h2>
                <p style="color: var(--gray);">Crafted from premium ingredients, fresh every day.</p>
            </div>
            
            <!-- Category Filter Buttons -->
            <div class="category-nav">
                <button class="category-btn active" data-category="all">All Items</button>
                <button class="category-btn" data-category="Hot Drinks">Hot Drinks</button>
                <button class="category-btn" data-category="Cold Drinks">Cold Drinks</button>
                <button class="category-btn" data-category="Snacks">Snacks</button>
                <button class="category-btn" data-category="Pizza">Pizza</button>
                <button class="category-btn" data-category="Burger">Burger</button>
                <button class="category-btn" data-category="Desserts">Desserts</button>
            </div>
            
            <!-- Menu Sections -->
            <th:block th:each="entry : ${items_by_category}">
                <div class="category-section" th:id="'cat-' + ${#strings.replace(entry.key, ' ', '-')}">
                    <h3 th:text="${entry.key}"></h3>
                    
                    <div class="items-grid">
                        <th:block th:if="${not #lists.isEmpty(entry.value)}">
                            <div th:each="item : ${entry.value}" class="menu-card" th:data-category="${item.category}">
                                <th:block th:if="${item.imageUrl != null && !item.imageUrl.isEmpty()}">
                                    <img th:src="${item.imageUrl}" class="menu-img" th:alt="${item.name}">
                                </th:block>
                                <th:block th:unless="${item.imageUrl != null && !item.imageUrl.isEmpty()}">
                                    <div class="menu-img" style="display: flex; align-items: center; justify-content: center; font-size: 3rem;">☕</div>
                                </th:block>
                                
                                <div class="menu-info">
                                    <h4 th:text="${item.name}"></h4>
                                    <p class="menu-desc" th:text="${item.description}"></p>
                                    
                                    <div class="menu-price-action">
                                        <span class="menu-price" th:text="'INR ' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                                        <button class="add-to-cart-btn" 
                                                th:data-id="${item.id}" 
                                                th:data-name="${item.name}" 
                                                th:data-price="${item.price}"
                                                title="Add to Cart">
                                            +
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </th:block>
                        <th:block th:if="${#lists.isEmpty(entry.value)}">
                            <p style="color: var(--gray); font-style: italic;">No items available in this category.</p>
                        </th:block>
                    </div>
                </div>
            </th:block>
        </div>
        
        <!-- Sticky Shopping Cart Sidebar Panel -->
        <div class="cart-panel">
            <h3>
                <span><i class="fa-solid fa-cart-shopping" style="color: var(--accent);"></i> Shopping Cart</span>
                <span class="cart-count-badge">0</span>
            </h3>
            
            <!-- List of items inside cart (populated dynamically by main.js) -->
            <div class="cart-items-container" id="cart-items">
                <!-- Cart items will be loaded by Javascript -->
            </div>
            
            <!-- Cart Totals & Checkout -->
            <div class="cart-totals">
                <div class="cart-total-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">INR 0.00</span>
                </div>
                <div class="cart-total-row">
                    <span>GST (5%)</span>
                    <span id="cart-gst">INR 0.00</span>
                </div>
                <div class="cart-total-row grand">
                    <span>Grand Total</span>
                    <span id="cart-total">INR 0.00</span>
                </div>
                
                <!-- Quick Checkout Details -->
                <form id="mini-checkout-form" class="checkout-form-mini">
                    <th:block th:if="${logged_in}">
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <input type="text" id="cust-name" placeholder="Your Name" th:value="${username}" required style="padding: 0.5rem 0.8rem; font-size: 0.85rem;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <input type="tel" id="cust-phone" placeholder="Contact Phone Number" required style="padding: 0.5rem 0.8rem; font-size: 0.85rem;">
                        </div>
                        <button type="submit" id="checkout-btn" class="btn" style="width: 100%;" disabled>
                            <i class="fa-solid fa-qrcode"></i> Proceed to Checkout
                        </button>
                    </th:block>
                    <th:block th:unless="${logged_in}">
                        <div style="text-align: center; margin-top: 1rem; padding: 0.5rem; background-color: var(--cream-dark); border-radius: 6px;">
                            <p style="font-size: 0.8rem; color: var(--primary); font-weight: 500; margin-bottom: 0.5rem;">Please Login to order food.</p>
                            <a th:href="@{/login}" class="btn btn-sm" style="width: 100%; font-size: 0.85rem; padding: 0.5rem 1rem;"><i class="fa-solid fa-right-to-bracket"></i> Login to Order</a>
                        </div>
                    </th:block>
                </form>
            </div>
        </div>
        
    </div>
</div>

<script>
    // Client-side category filtering
    document.addEventListener('DOMContentLoaded', () => {
        const categoryButtons = document.querySelectorAll('.category-btn');
        const sections = document.querySelectorAll('.category-section');
        
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.category;
                
                // Toggle active class on button
                categoryButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Filter sections
                sections.forEach(sec => {
                    const secId = sec.id.replace('cat-', '');
                    
                    if (category === 'all') {
                        sec.style.display = 'block';
                    } else if (secId === category.replace(' ', '-')) {
                        sec.style.display = 'block';
                    } else {
                        sec.style.display = 'none';
                    }
                });
            });
        });
    });
</script>
</main>
</body>
</html>
